---
# Install once:   pre-commit install
# Manual run:     pre-commit run --all-files
#
# Focused on the specific mistakes that round-1..4 reviews caught that
# could have been prevented at commit time:
#   - malformed JSON dashboards (check-json)
#   - stale YAML (check-yaml)
#   - trailing whitespace and missing newlines in shell / markdown
#   - shell script syntax errors (shellcheck)
#   - accidentally committed .env / secrets

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-added-large-files
        args: [--maxkb=500]      # dashboards can be moderately big
      - id: detect-private-key

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: [-e, SC2086]   # too noisy for our bootstrap scripts

  - repo: local
    hooks:
      - id: no-dev-tokens-in-tracked
        name: dev tokens must not leak into tracked files
        language: system
        entry: python
        args:
          - -c
          - |
            # ADR-001 of this repo: `dev-token-*` literals belong in
            # demo/.env.example only. Anywhere else would be a regression
            # (prior rounds had the string hard-coded in 4 files).
            #
            # Scan ONLY git-tracked files (via `git ls-files`) so we don't
            # false-positive on .venv, demo/.env (gitignored), node_modules,
            # docker volume mounts, etc. Also allowlist docs/adr/**/*.md
            # because ADRs document the historical token for explanatory
            # purposes.
            import pathlib, re, subprocess, sys

            allowed_prefixes = (
                "demo/.env.example",
                "docs/adr/",
                ".pre-commit-config.yaml",
            )

            try:
                tracked = subprocess.check_output(
                    ["git", "ls-files"], text=True
                ).splitlines()
            except Exception as e:
                sys.exit(f"cannot run `git ls-files`: {e}")

            bad = []
            pattern = re.compile(r"dev-token-[A-Za-z0-9\-]+")
            for rel in tracked:
                if any(rel.replace("\\", "/").startswith(p) for p in allowed_prefixes):
                    continue
                p = pathlib.Path(rel)
                if not p.is_file():
                    continue
                try:
                    text = p.read_text(encoding="utf-8", errors="ignore")
                except Exception:
                    continue
                for m in pattern.finditer(text):
                    bad.append(f"{rel}: {m.group(0)}")

            if bad:
                sys.exit(
                    "dev-token literal found in tracked files (allowed only in "
                    "demo/.env.example and docs/adr/):\n  " + "\n  ".join(bad)
                )
        pass_filenames: false
