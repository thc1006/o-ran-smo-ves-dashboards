apiVersion: 1

datasources:
  - name: InfluxDB-VES
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    isDefault: true
    # InfluxQL against InfluxDB 2.x requires:
    #   (a) a DBRP mapping so the database name routes to the bucket
    #       (bootstrap: POST /api/v2/dbrps with {database: "ves", ...}),
    #   (b) the auth token passed as an Authorization HTTP header, NOT
    #       the InfluxDB v2 native header scheme. We use Grafana's
    #       httpHeader facility for this so the token stays in
    #       secureJsonData.
    jsonData:
      version: InfluxQL
      httpMode: GET
      dbName: ves
      httpHeaderName1: "Authorization"
    secureJsonData:
      httpHeaderValue1: "Token dev-token-not-for-production"
    editable: true
