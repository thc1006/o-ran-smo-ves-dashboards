apiVersion: 1

datasources:
  - name: InfluxDB-VES
    # Explicit UID so dashboard JSON can reference it stably across fresh
    # Grafana installs; without this, Grafana mints a random UID and every
    # dashboard's datasource binding breaks on re-provision.
    uid: influxdb-ves
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    isDefault: true
    # InfluxQL against InfluxDB 2.x requires:
    #   (a) a DBRP mapping so the database name routes to the bucket
    #       (bootstrap: POST /api/v2/dbrps with {database: "ves", ...}),
    #   (b) the auth token passed as an Authorization HTTP header, NOT
    #       the InfluxDB v2 native header scheme. We use Grafana's
    #       httpHeader facility for this so the token stays in
    #       secureJsonData.
    jsonData:
      version: InfluxQL
      httpMode: GET
      dbName: ves
      httpHeaderName1: "Authorization"
    secureJsonData:
      # Template expansion pulls ${INFLUX_ADMIN_TOKEN} from the grafana
      # container's env (set via env_file: .env in docker-compose.yaml).
      httpHeaderValue1: "Token $INFLUX_ADMIN_TOKEN"
    editable: true
