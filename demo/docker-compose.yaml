# Lightweight local dev stack -- NOT a replica of nonrtric-plt-influxlogger.
#
# Purpose: let contributors iterate on dashboard JSON with realistic-looking
# data shapes, without having to bring up a full kind + ranpm stack.
#
# Secrets (admin token, admin password) are read from .env in this directory.
# Copy .env.example to .env before first run and change the CHANGE-ME values
# if the stack will be reachable from outside localhost.
#
# For schema-accurate data (Phase 1), use kind/install-ranpm.sh instead.

services:
  influxdb:
    # Digest-pinned for reproducibility; refresh via
    #   docker pull influxdb:2.7-alpine
    #   docker inspect influxdb:2.7-alpine --format '{{index .RepoDigests 0}}'
    # Last refreshed 2026-04-19.
    image: influxdb:2.7-alpine@sha256:cf6476ce69eb017522fce67a5e69670d79ce05322b9271accfb9a9ca39c97b07
    restart: unless-stopped
    ports:
      - "8086:8086"
    env_file: .env
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUX_ADMIN_USER:?set in .env}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_ADMIN_PASSWORD:?set in .env}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUX_ORG:?set in .env}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUX_BUCKET:?set in .env}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_ADMIN_TOKEN:?set in .env}
    volumes:
      # Named volume (not bind mount) so the InfluxDB container's internal
      # UID can own the storage without host-side chown dance. Bind mounts
      # into ./data/ from GitHub Actions runners hit UID-mismatch errors
      # (runner creates dir as 1001; influxdb runs as other UID).
      - influx-data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8086/health"]
      interval: 3s
      timeout: 2s
      retries: 20

  # One-shot bootstrap: create an InfluxDB v1 DBRP mapping so Grafana's
  # InfluxQL mode can route the database name to the bucket. Without this,
  # Grafana proxy queries return "Authentication to data source failed".
  influxdb-dbrp-bootstrap:
    # Reuse influxdb image; ships influx CLI. Same digest as above.
    image: influxdb:2.7-alpine@sha256:cf6476ce69eb017522fce67a5e69670d79ce05322b9271accfb9a9ca39c97b07
    restart: "no"
    depends_on:
      influxdb:
        condition: service_healthy
    env_file: .env
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        influx config create --config-name bootstrap \
            --host-url http://influxdb:8086 \
            --org "$$INFLUX_ORG" \
            --token "$$INFLUX_ADMIN_TOKEN" \
            --active 2>/dev/null \
            || influx config set --config-name bootstrap --active
        if influx v1 dbrp list --json 2>/dev/null \
             | grep -q "\"database\": \"$$INFLUX_BUCKET\""; then
            echo "dbrp for database=$$INFLUX_BUCKET already present"
            exit 0
        fi
        BUCKET_ID=$$(influx bucket list --name "$$INFLUX_BUCKET" --json | \
            sed -n 's/.*"id": "\([^"]*\)".*/\1/p' | head -n1)
        echo "creating dbrp: database=$$INFLUX_BUCKET -> bucket=$$BUCKET_ID"
        influx v1 dbrp create \
            --bucket-id "$$BUCKET_ID" \
            --db "$$INFLUX_BUCKET" \
            --rp autogen \
            --default
        echo "dbrp bootstrap done"

  grafana:
    # Digest-pinned; refresh via
    #   docker pull grafana/grafana:12.2.0
    #   docker inspect grafana/grafana:12.2.0 --format '{{index .RepoDigests 0}}'
    # Last refreshed 2026-04-19.
    image: grafana/grafana:12.2.0@sha256:74144189b38447facf737dfd0f3906e42e0776212bf575dc3334c3609183adf7
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      influxdb-dbrp-bootstrap:
        condition: service_completed_successfully
    env_file: .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:?set in .env}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set in .env}
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Pass the InfluxDB token through to provisioning templates.
      INFLUX_ADMIN_TOKEN: ${INFLUX_ADMIN_TOKEN:?set in .env}
    volumes:
      - ./grafana-provisioning:/etc/grafana/provisioning:ro
      - ../dashboards:/var/lib/grafana/dashboards:ro
      # Named volume so Grafana's internal UID 472 owns the storage
      # cleanly. Prior bind mount to ./data/grafana/ failed on GitHub
      # Actions runners with "/var/lib/grafana is not writable" because
      # the runner created the host dir as a different UID and Grafana
      # could not chown it inside the container.
      - grafana-data:/var/lib/grafana

volumes:
  influx-data:
  grafana-data:
